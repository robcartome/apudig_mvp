{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="card" style="max-width:420px; margin:auto;">
  <h2>Ingreso al sistema</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="actions">
      <button class="primary" type="submit">Entrar</button>
    </div>
  </form>
</div>
{% endblock %}
