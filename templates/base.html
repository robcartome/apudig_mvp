<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}APUDIG MVP{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f6f7fb; }
    header { background: #1f2937; color: #fff; padding: 12px 20px; }
    main { max-width: 960px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .actions { display: flex; gap: 8px; margin-top: 12px; }
    button, .btn { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; cursor: pointer; text-decoration: none; color: #111827; }
    .primary { background: #111827; color: #fff; border-color: #111827; }
    input, select { width: 100%; padding: 8px; margin-top: 6px; margin-bottom: 12px; border: 1px solid #d1d5db; border-radius: 6px; }
    .muted { color: #6b7280; }
  </style>
</head>
<body>
<header>
  <strong>APUDIG MVP</strong>
  {% if user.is_authenticated %}
    <span style="float:right;">{{ user.username }} · <a href="{% url 'logout' %}" style="color:#fff;">Salir</a></span>
  {% endif %}
</header>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
