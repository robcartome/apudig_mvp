version: "3.9"

services:
  db:
    image: postgres:15
    container_name: apudig_mvp_db
    restart: always
    environment:
      POSTGRES_DB: apudig_mvp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: apudig_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@apudig.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: